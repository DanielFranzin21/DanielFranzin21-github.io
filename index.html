<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL://ESCAPE — Fuga do Sistema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #070a09;
    --bg-panel: #0d1411;
    --grid-line: #132019;
    --green: #39ff88;
    --green-dim: #1c8a4d;
    --cyan: #4ff0ff;
    --magenta: #ff3d7f;
    --amber: #ffd23f;
    --text: #d8f5e3;
    --text-dim: #6e9c85;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(0deg, rgba(57,255,136,0.035) 0px, rgba(57,255,136,0.035) 1px, transparent 1px, transparent 3px),
      radial-gradient(circle at 50% -10%, #0f1c15 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    overflow-x:hidden;
  }
  .display{font-family:'Press Start 2P', monospace;}

  .console{
    width:100%;
    max-width:760px;
    background:var(--bg-panel);
    border:2px solid var(--green-dim);
    border-radius:6px;
    box-shadow: 0 0 0 1px #000, 0 0 40px rgba(57,255,136,0.08), inset 0 0 60px rgba(0,0,0,0.6);
    position:relative;
    overflow:hidden;
  }
  .console::before{
    content:"";
    position:absolute; inset:0;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
    pointer-events:none;
    mix-blend-mode:multiply;
  }

  /* HEADER */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px;
    border-bottom:1px solid var(--grid-line);
    background:linear-gradient(180deg, #0f1a14, #0b120e);
    gap:12px; flex-wrap:wrap;
  }
  .brand{font-family:'Press Start 2P'; font-size:11px; color:var(--green); letter-spacing:1px;}
  .brand span{color:var(--magenta);}
  .lives{display:flex; gap:6px;}
  .life-block{
    width:14px; height:14px;
    background:var(--green);
    box-shadow:0 0 6px var(--green);
    clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
  }
  .life-block.lost{ background:#1f2a24; box-shadow:none; }

  /* PROGRESS PATH */
  .path-row{
    display:flex; align-items:center; justify-content:center;
    gap:6px; padding:16px 14px 4px;
  }
  .gate{
    width:22px; height:22px;
    border:2px solid var(--grid-line);
    background:#0a100c;
    display:flex; align-items:center; justify-content:center;
    font-size:9px; color:var(--text-dim); font-family:'Press Start 2P';
    position:relative;
  }
  .gate.done{ border-color:var(--green); background:rgba(57,255,136,0.12); color:var(--green); }
  .gate.current{ border-color:var(--cyan); box-shadow:0 0 10px var(--cyan); color:var(--cyan); animation:pulse 1.2s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.55;} }
  .pixel-runner{
    position:absolute; top:-16px; left:0;
    width:10px; height:10px; background:var(--amber);
    box-shadow:0 0 8px var(--amber);
    transition: transform 0.5s cubic-bezier(.4,1.4,.6,1);
  }

  /* MAIN STAGE */
  .stage{ padding:22px 24px 26px; position:relative; }
